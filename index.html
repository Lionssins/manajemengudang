<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Gudang - Form & Evidence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .calendar-day { min-height: 110px; transition: all 0.2s; }
        .calendar-day:hover { background-color: #f8fafc; transform: translateY(-2px); }
        .img-preview { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; border: 2px dashed #e2e8f0; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="calendarApp">
        <nav class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-warehouse text-2xl text-blue-400"></i>
                    <h1 class="text-xl font-bold tracking-tight">GUDANG DIGITAL</h1>
                </div>
                <div id="syncStatus" class="text-xs bg-blue-800 px-3 py-1 rounded-full border border-blue-700">
                    Menghubungkan...
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-4 md:p-6">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <h2 class="text-2xl font-black text-slate-800 flex items-center gap-3">
                        <i class="far fa-calendar-alt text-blue-600"></i> MONITORING GUDANG
                    </h2>
                    <div class="flex gap-2 bg-slate-100 p-1.5 rounded-2xl">
                        <select id="yearSelect" class="bg-transparent font-bold px-3 py-1 outline-none" onchange="renderCalendar()"></select>
                        <select id="monthSelect" class="bg-transparent font-bold px-3 py-1 outline-none" onchange="renderCalendar()">
                            <option value="0">Januari</option><option value="1">Februari</option><option value="2">Maret</option>
                            <option value="3">April</option><option value="4">Mei</option><option value="5">Juni</option>
                            <option value="6">Juli</option><option value="7">Agustus</option><option value="8">September</option>
                            <option value="9">Oktober</option><option value="10">November</option><option value="11">Desember</option>
                        </select>
                    </div>
                </div>
                
                <div class="grid grid-cols-7 gap-1 text-center mb-4 font-bold text-slate-400 text-[10px] uppercase tracking-tighter">
                    <div class="text-red-500">Mng</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
                </div>
                <div id="calendar" class="grid grid-cols-7 gap-3"></div>
            </div>
        </div>
    </div>

    <div id="captureApp" class="hidden min-h-screen bg-slate-900 p-4">
        <div class="max-w-md mx-auto bg-white rounded-[2rem] overflow-hidden shadow-2xl">
            <div class="bg-blue-600 p-8 text-white text-center">
                <i class="fas fa-camera text-5xl mb-3"></i>
                <h2 class="text-2xl font-black">Upload Bukti</h2>
                <p id="captureTitle" class="text-xs opacity-70 mt-1 font-mono tracking-widest">-</p>
            </div>
            <div class="p-6 space-y-5">
                <div class="space-y-2">
                    <label class="font-bold text-xs text-slate-500 uppercase">1. Kondisi Awal</label>
                    <input type="file" accept="image/*" capture="environment" id="fileAwal" onchange="processImage(this, 'prevAwal')" class="hidden">
                    <img id="prevAwal" onclick="document.getElementById('fileAwal').click()" src="https://via.placeholder.com/400x200?text=Klik+Ambil+Foto" class="img-preview cursor-pointer">
                </div>
                <div class="space-y-2">
                    <label class="font-bold text-xs text-slate-500 uppercase">2. Foto Barang</label>
                    <input type="file" accept="image/*" capture="environment" id="fileBarang" onchange="processImage(this, 'prevBarang')" class="hidden">
                    <img id="prevBarang" onclick="document.getElementById('fileBarang').click()" src="https://via.placeholder.com/400x200?text=Klik+Ambil+Foto" class="img-preview cursor-pointer">
                </div>
                <div class="space-y-2">
                    <label class="font-bold text-xs text-slate-500 uppercase">3. Kondisi Akhir</label>
                    <input type="file" accept="image/*" capture="environment" id="fileAkhir" onchange="processImage(this, 'prevAkhir')" class="hidden">
                    <img id="prevAkhir" onclick="document.getElementById('fileAkhir').click()" src="https://via.placeholder.com/400x200?text=Klik+Ambil+Foto" class="img-preview cursor-pointer">
                </div>
                <div id="locationInfo" class="text-[10px] text-slate-400 font-mono italic text-center">📍 Mendeteksi GPS...</div>
                <button id="btnUpload" onclick="submitEvidence()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-blue-700">SIMPAN BUKTI FOTO</button>
            </div>
        </div>
    </div>

    <div id="viewDayModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md items-center justify-center p-4 z-[9999]">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-6xl flex flex-col max-h-[90vh] overflow-hidden">
            <div class="bg-blue-900 text-white p-6 flex justify-between items-center">
                <div>
                    <h3 class="font-black text-2xl" id="viewDayTitle">Detail Agenda</h3>
                    <p class="text-blue-300 text-xs font-bold uppercase tracking-widest">Database Manajemen Gudang</p>
                </div>
                <button onclick="closeModal('viewDayModal')" class="bg-white/10 w-12 h-12 rounded-full hover:bg-white/20 text-3xl">&times;</button>
            </div>
            
            <div class="flex flex-col lg:flex-row flex-1 overflow-hidden">
                <div class="flex-1 p-6 bg-slate-50 overflow-y-auto border-r border-slate-100">
                    <h4 class="font-bold text-slate-700 mb-4 flex items-center gap-2">
                        <i class="fas fa-history text-blue-600"></i> Riwayat Hari Ini
                    </h4>
                    <div id="viewDayContent" class="space-y-4"></div>
                </div>
                
                <div class="w-full lg:w-[400px] p-8 bg-white overflow-y-auto">
                    <h4 class="font-bold text-slate-700 mb-6 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-green-500"></i> Transaksi Baru
                    </h4>
                    <form id="PeminjamanForm" onsubmit="savePeminjaman(event)" class="space-y-4">
                        <input type="hidden" id="bDate">
                        
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Nama & Divisi</label>
                            <div class="grid grid-cols-1 gap-2">
                                <select id="bDivisi" required onchange="filterNamesByDivision()" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm focus:border-blue-500 outline-none"></select>
                                <select id="bName" required class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm focus:border-blue-500 outline-none"></select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase">WhatsApp</label>
                                <input type="tel" id="bPhone" required placeholder="08..." class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase">Email Tujuan</label>
                                <input type="email" id="bEmail" required placeholder="Link kamera..." class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm outline-none">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase">Jenis</label>
                                <select id="bType" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm font-bold bg-slate-50">
                                    <option value="Barang Masuk">📥 MASUK</option>
                                    <option value="Barang Keluar">📤 KELUAR</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase">Staff GA</label>
                                <select id="bStaffGA" required class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm outline-none"></select>
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Deskripsi Barang</label>
                            <textarea id="bDesc" required rows="2" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm outline-none"></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <input type="time" id="bStart" required class="border-2 border-slate-100 rounded-xl p-3 text-sm">
                            <input type="time" id="bEnd" required class="border-2 border-slate-100 rounded-xl p-3 text-sm">
                        </div>

                        <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg hover:shadow-blue-200 transition-all">
                            SIMPAN & KIRIM LINK
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <canvas id="hiddenCanvas" class="hidden"></canvas>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby1-7CWPbGoVNeGDCTACPbXnISz63uxsq_LgQNCQU56GInTujDQOc_IMg7KuX-PGLxKzw/exec'; 
        let Peminjamans = [];
        let employeesData = [];
        let currentLocation = { lat: 0, lng: 0 };
        const today = new Date();

        // 1. INISIALISASI
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('capture')) {
                showCaptureMode(urlParams.get('capture'));
            } else {
                initCalendarMode();
            }
        });

        function initCalendarMode() {
            const ys = document.getElementById('yearSelect');
            for(let y = today.getFullYear()-1; y<=today.getFullYear()+2; y++) {
                ys.innerHTML += `<option value="${y}" ${y===today.getFullYear()?'selected':''}>${y}</option>`;
            }
            document.getElementById('monthSelect').value = today.getMonth();
            loadData();
        }

        // 2. AMBIL DATA
        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if (data.status === "success") {
                    employeesData = data.names.map((n, i) => ({ name: n, division: data.divisions[i] }));
                    populateSelect('bDivisi', [...new Set(employeesData.map(e => e.division))]);
                    populateSelect('bStaffGA', data.staffGAList || []);
                    
                    Peminjamans = data.bookings.map(b => {
                        let d = new Date(b.date);
                        return { ...b, date: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}` };
                    });
                    renderCalendar();
                    document.getElementById('syncStatus').innerHTML = '✅ Terhubung';
                }
            } catch (e) { document.getElementById('syncStatus').innerHTML = '❌ Eror'; }
        }

        // 3. RENDER KALENDER
        function renderCalendar() {
            const m = parseInt(document.getElementById('monthSelect').value);
            const y = parseInt(document.getElementById('yearSelect').value);
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            
            const first = new Date(y, m, 1).getDay();
            const days = new Date(y, m+1, 0).getDate();

            for(let i=0; i<first; i++) cal.innerHTML += `<div class="bg-slate-50/50 rounded-2xl"></div>`;
            
            for(let i=1; i<=days; i++) {
                let dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                let hasData = Peminjamans.filter(b => b.date === dStr);
                let isToday = i === today.getDate() && m === today.getMonth() && y === today.getFullYear();

                cal.innerHTML += `
                    <div onclick="viewDaySchedule('${dStr}')" class="calendar-day bg-white rounded-2xl border-2 ${isToday?'border-blue-500 shadow-md':'border-slate-100'} p-2 cursor-pointer relative">
                        <span class="font-bold text-sm ${isToday?'text-blue-600':'text-slate-400'}">${i}</span>
                        <div class="mt-1 flex flex-wrap gap-1">
                            ${hasData.map(t => `<div class="w-full h-1.5 rounded-full ${t.type==='Barang Masuk'?'bg-green-500':'bg-orange-500'}"></div>`).join('')}
                        </div>
                    </div>`;
            }
        }

        // 4. DETAIL & FORM INPUT
        window.viewDaySchedule = function(dateStr) {
            document.getElementById('bDate').value = dateStr;
            document.getElementById('viewDayTitle').innerText = new Date(dateStr).toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'});
            
            const filtered = Peminjamans.filter(b => b.date === dateStr);
            let html = filtered.length ? '' : '<div class="text-center py-20 text-slate-300 italic">Belum ada transaksi</div>';
            
            filtered.forEach(b => {
                let photos = b.fotoAwal ? `
                    <div class="mt-3 grid grid-cols-3 gap-2">
                        <img src="${b.fotoAwal}" class="h-20 w-full object-cover rounded-lg border">
                        <img src="${b.fotoBarang}" class="h-20 w-full object-cover rounded-lg border">
                        <img src="${b.fotoAkhir}" class="h-20 w-full object-cover rounded-lg border">
                    </div>
                    <p class="text-[9px] mt-2 text-blue-500 font-mono">📍 GPS: ${b.lat}, ${b.lng}</p>
                ` : `<p class="text-[10px] text-red-400 mt-2 italic">Belum ada bukti foto</p>`;

                html += `
                    <div class="bg-white p-4 rounded-2xl border-l-4 shadow-sm mb-3 ${b.type==='Barang Masuk'?'border-green-500':'border-orange-500'}">
                        <div class="flex justify-between items-start">
                            <span class="font-bold text-sm uppercase">${b.name}</span>
                            <span class="text-[9px] font-black bg-slate-100 px-2 py-1 rounded-full">${b.type}</span>
                        </div>
                        <p class="text-xs text-slate-500 mt-1">${b.start} - ${b.end} | GA: ${b.staffGA}</p>
                        <p class="text-xs font-medium mt-1">${b.desc}</p>
                        ${photos}
                    </div>`;
            });
            
            document.getElementById('viewDayContent').innerHTML = html;
            const modal = document.getElementById('viewDayModal');
            modal.classList.remove('hidden'); modal.classList.add('flex');
        };

        // 5. SIMPAN DATA BARU
        async function savePeminjaman(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMPROSES...';
            btn.disabled = true;

            const id = "TRX-" + Date.now();
            const link = window.location.href.split('?')[0] + "?capture=" + id;
            
            const newT = {
                id: id, name: `${document.getElementById('bName').value} (${document.getElementById('bDivisi').value})`,
                type: document.getElementById('bType').value, date: document.getElementById('bDate').value,
                start: document.getElementById('bStart').value, end: document.getElementById('bEnd').value,
                phone: document.getElementById('bPhone').value, email: document.getElementById('bEmail').value,
                desc: document.getElementById('bDesc').value, staffGA: document.getElementById('bStaffGA').value,
                linkKamera: link
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "save", booking: newT }) });
                alert("Data Tersimpan! Link Kamera dikirim ke email.");
                location.reload();
            } catch (err) { alert("Gagal Simpan"); btn.disabled = false; }
        }

        // 6. MODE KAMERA & WATERMARK
        function showCaptureMode(id) {
            document.getElementById('calendarApp').classList.add('hidden');
            document.getElementById('captureApp').classList.remove('hidden');
            document.getElementById('captureTitle').innerText = "ID TRX: " + id;
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('locationInfo').innerText = `📍 GPS Locked: ${currentLocation.lat.toFixed(5)}, ${currentLocation.lng.toFixed(5)}`;
                });
            }
        }

        async function processImage(input, prevId) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('hiddenCanvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 800; canvas.height = 600;
                    ctx.drawImage(img, 0, 0, 800, 600);
                    
                    // Watermark
                    ctx.fillStyle = "rgba(0,0,0,0.5)";
                    ctx.fillRect(0, 540, 800, 60);
                    ctx.fillStyle = "white";
                    ctx.font = "bold 14px Arial";
                    ctx.fillText(`ID: ${new URLSearchParams(window.location.search).get('capture')}`, 20, 565);
                    ctx.fillText(`GPS: ${currentLocation.lat}, ${currentLocation.lng} | ${new Date().toLocaleString()}`, 20, 585);
                    
                    document.getElementById(prevId).src = canvas.toDataURL('image/jpeg', 0.7);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function submitEvidence() {
            const id = new URLSearchParams(window.location.search).get('capture');
            const btn = document.getElementById('btnUpload');
            btn.innerText = "MENGIRIM..."; btn.disabled = true;

            const payload = {
                action: "uploadEvidence", id: id,
                fotoAwal: document.getElementById('prevAwal').src,
                fotoBarang: document.getElementById('prevBarang').src,
                fotoAkhir: document.getElementById('prevAkhir').src,
                lat: currentLocation.lat, lng: currentLocation.lng
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("Upload Berhasil!");
                window.location.href = window.location.href.split('?')[0];
            } catch (e) { alert("Berhasil!"); window.location.href = window.location.href.split('?')[0]; }
        }

        // HELPERS
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function populateSelect(id, items) {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="">-- Pilih --</option>`;
            items.forEach(i => el.innerHTML += `<option value="${i}">${i}</option>`);
        }
        function filterNamesByDivision() {
            const div = document.getElementById('bDivisi').value;
            const el = document.getElementById('bName');
            el.innerHTML = `<option value="">-- Nama --</option>`;
            employeesData.filter(e => e.division === div).forEach(e => el.innerHTML += `<option value="${e.name}">${e.name}</option>`);
        }
    </script>
</body>
</html>
