<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Gudang - Fixed Foto & Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .calendar-day { min-height: 100px; transition: all 0.2s; border-radius: 0.75rem; }
        .calendar-day:hover { background-color: #f8fafc; border-color: #cbd5e1; }
        .img-preview-box { width: 100%; height: 120px; object-fit: cover; border-radius: 0.75rem; border: 2px dashed #e2e8f0; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <div id="calendarApp">
        <nav class="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-warehouse text-2xl text-slate-300"></i>
                    <h1 class="text-xl font-bold tracking-tight">GUDANG DIGITAL</h1>
                </div>
                <div class="flex items-center gap-3">
                    <div id="syncStatus" class="text-xs bg-slate-800 px-3 py-1 rounded-full border border-slate-700 hidden md:block">Menghubungkan...</div>
                    <button onclick="document.getElementById('loginModal').classList.remove('hidden'); document.getElementById('loginModal').classList.add('flex')" id="adminBtnStatus" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-full border border-slate-600 transition font-bold"><i class="fas fa-user-shield"></i> Login Admin</button>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-4 md:p-6">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200">
                <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                    <h2 class="text-2xl font-black text-slate-800 flex items-center gap-3">
                        <i class="far fa-calendar-alt text-slate-800"></i> MONITORING JADWAL
                    </h2>
                    <div class="flex gap-2 bg-slate-100 p-1.5 rounded-2xl">
                        <select id="yearSelect" class="bg-transparent font-bold px-3 py-1 outline-none cursor-pointer" onchange="renderCalendar()"></select>
                        <select id="monthSelect" class="bg-transparent font-bold px-3 py-1 outline-none cursor-pointer" onchange="renderCalendar()">
                            <option value="0">Januari</option><option value="1">Februari</option><option value="2">Maret</option>
                            <option value="3">April</option><option value="4">Mei</option><option value="5">Juni</option>
                            <option value="6">Juli</option><option value="7">Agustus</option><option value="8">September</option>
                            <option value="9">Oktober</option><option value="10">November</option><option value="11">Desember</option>
                        </select>
                    </div>
                </div>
                
                <div class="grid grid-cols-7 gap-1 text-center mb-2 font-bold text-slate-500 text-[11px] uppercase tracking-wider">
                    <div class="text-red-500">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
                </div>
                <div id="calendar" class="grid grid-cols-7 gap-2 md:gap-3"></div>
                
                <div class="mt-8 pt-6 border-t border-slate-100 flex justify-center gap-6 text-sm font-bold text-slate-600">
                    <div class="flex items-center gap-2 px-4 py-2 bg-slate-50 rounded-full border border-slate-200">
                        <i class="fas fa-arrow-down text-green-500 bg-green-100 p-1.5 rounded-full text-xs"></i> Barang Masuk
                    </div>
                    <div class="flex items-center gap-2 px-4 py-2 bg-slate-50 rounded-full border border-slate-200">
                        <i class="fas fa-arrow-up text-orange-500 bg-orange-100 p-1.5 rounded-full text-xs"></i> Barang Keluar
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="captureApp" class="hidden min-h-screen bg-slate-900 p-4">
        <div class="max-w-md mx-auto bg-white rounded-[2rem] overflow-hidden shadow-2xl mt-4">
            <div class="bg-slate-800 p-8 text-white text-center">
                <i class="fas fa-camera text-5xl mb-3"></i>
                <h2 class="text-2xl font-black">Upload Bukti</h2>
                <p id="captureTitle" class="text-xs opacity-70 font-mono tracking-widest">-</p>
            </div>
            <div class="p-6 space-y-5">
                <input type="file" accept="image/*" capture="environment" id="fileAwal" onchange="processImage(this, 'prevAwal')" class="hidden">
                <img id="prevAwal" onclick="document.getElementById('fileAwal').click()" src="https://via.placeholder.com/400x200?text=Klik+Foto+Kondisi+Awal" class="img-preview-box hover:opacity-80 transition">
                
                <input type="file" accept="image/*" capture="environment" id="fileBarang" onchange="processImage(this, 'prevBarang')" class="hidden">
                <img id="prevBarang" onclick="document.getElementById('fileBarang').click()" src="https://via.placeholder.com/400x200?text=Klik+Foto+Barang" class="img-preview-box hover:opacity-80 transition">
                
                <input type="file" accept="image/*" capture="environment" id="fileAkhir" onchange="processImage(this, 'prevAkhir')" class="hidden">
                <img id="prevAkhir" onclick="document.getElementById('fileAkhir').click()" src="https://via.placeholder.com/400x200?text=Klik+Foto+Kondisi+Akhir" class="img-preview-box hover:opacity-80 transition">

                <div id="locationInfo" class="text-[10px] text-slate-400 font-mono italic text-center">📍 Mendeteksi GPS...</div>
                <button id="btnUpload" onclick="submitEvidence()" class="w-full bg-slate-800 hover:bg-slate-900 transition text-white font-black py-4 rounded-2xl shadow-lg">SIMPAN BUKTI FOTO</button>
            </div>
        </div>
    </div>

    <div id="viewDayModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm items-center justify-center p-4 z-[9999]">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-6xl flex flex-col max-h-[90vh] overflow-hidden">
            <div class="bg-slate-900 text-white p-5 flex justify-between items-center">
                <div><h3 class="font-black text-xl" id="viewDayTitle">Detail Agenda</h3></div>
                <button onclick="closeModal('viewDayModal')" class="bg-white/10 hover:bg-white/20 w-10 h-10 rounded-full text-2xl transition">×</button>
            </div>
            <div class="flex flex-col lg:flex-row flex-1 overflow-hidden">
                <div class="flex-1 p-6 bg-slate-50 overflow-y-auto border-r border-slate-200" id="viewDayContent"></div>
                
                <div class="w-full lg:w-[400px] p-6 bg-white overflow-y-auto">
                    <h4 class="font-bold text-slate-800 mb-5 flex items-center gap-2"><i class="fas fa-plus-circle text-slate-500"></i> Transaksi Baru</h4>
                    <form id="PeminjamanForm" onsubmit="savePeminjaman(event)" class="space-y-4">
                        <input type="hidden" id="bDate">
                        <input type="hidden" id="bId"> <select id="bDivisi" required onchange="filterNamesByDivision()" class="w-full border-2 border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-slate-500 bg-slate-50"></select>
                        <select id="bName" required class="w-full border-2 border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-slate-500 bg-slate-50"></select>
                        <input type="tel" id="bPhone" required placeholder="No. WhatsApp" class="w-full border-2 border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-slate-500 bg-slate-50">
                        <input type="email" id="bEmail" required placeholder="Email untuk Link" class="w-full border-2 border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-slate-500 bg-slate-50">
                        <select id="bStaffGA" required class="w-full border-2 border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-slate-500 bg-slate-50"></select>
                        <select id="bType" class="w-full border-2 border-slate-200 rounded-xl p-2.5 text-sm font-bold bg-slate-100 outline-none focus:border-slate-500">
                            <option value="Barang Masuk">📥 MASUK</option>
                            <option value="Barang Keluar">📤 KELUAR</option>
                        </select>
                        <textarea id="bDesc" required placeholder="Keterangan Barang..." class="w-full border-2 border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-slate-500 bg-slate-50 h-20"></textarea>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="time" id="bStart" required class="border-2 border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-slate-500 bg-slate-50">
                            <input type="time" id="bEnd" required class="border-2 border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:border-slate-500 bg-slate-50">
                        </div>
                        <button type="submit" id="btnSubmit" class="w-full bg-slate-800 hover:bg-slate-900 transition text-white font-black py-3.5 rounded-xl shadow-md">SIMPAN & KIRIM</button>
                        <button type="button" id="btnCancelEdit" onclick="cancelEdit()" class="hidden w-full bg-red-100 text-red-600 font-bold py-2 rounded-xl mt-2">Batal Edit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm items-center justify-center p-4 z-[10000]">
        <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-sm text-center">
            <i class="fas fa-user-shield text-5xl text-slate-800 mb-4"></i>
            <h3 class="font-black text-2xl text-slate-800 mb-6">Login Admin</h3>
            <div class="space-y-4">
                <input type="text" id="adminUser" placeholder="Username" class="w-full border-2 border-slate-200 rounded-xl p-3 text-center outline-none focus:border-slate-800">
                <input type="password" id="adminPass" placeholder="Password" class="w-full border-2 border-slate-200 rounded-xl p-3 text-center outline-none focus:border-slate-800">
                <button onclick="handleLogin()" class="w-full bg-slate-800 text-white font-black py-3 rounded-xl hover:bg-slate-900">MASUK</button>
                <button onclick="closeModal('loginModal')" class="w-full text-slate-500 text-sm font-bold mt-2 hover:text-slate-700">Tutup</button>
            </div>
        </div>
    </div>

    <canvas id="hiddenCanvas" class="hidden"></canvas>

    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby1-7CWPbGoVNeGDCTACPbXnISz63uxsq_LgQNCQU56GInTujDQOc_IMg7KuX-PGLxKzw/exec'; 
        let Peminjamans = [];
        let employeesData = [];
        let currentLocation = { lat: 0, lng: 0 };
        let isAdmin = false; // Status Admin

        // --- SISTEM LOGIN ADMIN ---
        function handleLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            if(user === 'Admin' && pass === 'AdminGA') {
                isAdmin = true;
                closeModal('loginModal');
                const btn = document.getElementById('adminBtnStatus');
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Admin Aktif';
                btn.classList.replace('bg-slate-700', 'bg-green-600');
                btn.classList.replace('border-slate-600', 'border-green-500');
                alert('Login Berhasil. Fitur Edit & Hapus telah diaktifkan.');
            } else {
                alert('Username atau Password salah!');
            }
        }

        function getDirectLink(url) {
            if (!url || url === "") return "https://via.placeholder.com/150?text=No+Photo";
            if (url.includes('drive.google.com')) {
                const fileId = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1]?.split('&')[0];
                return fileId ? `https://drive.google.com/uc?export=view&id=${fileId}` : url;
            }
            return url;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('capture')) showCaptureMode(urlParams.get('capture'));
            else initCalendarMode();
        });

        function initCalendarMode() {
            const ys = document.getElementById('yearSelect');
            const now = new Date();
            for(let y = now.getFullYear()-1; y<=now.getFullYear()+2; y++) {
                ys.innerHTML += `<option value="${y}" ${y===now.getFullYear()?'selected':''}>${y}</option>`;
            }
            document.getElementById('monthSelect').value = now.getMonth();
            loadData();
        }

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if (data.status === "success") {
                    employeesData = data.names.map((n, i) => ({ name: n, division: data.divisions[i] }));
                    populateSelect('bDivisi', [...new Set(employeesData.map(e => e.division))]);
                    populateSelect('bStaffGA', data.staffGAList || []);
                    Peminjamans = data.bookings.map(b => {
                        let d = new Date(b.date);
                        return { ...b, date: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` };
                    });
                    renderCalendar();
                    document.getElementById('syncStatus').innerHTML = '✅ Sinkron';
                }
            } catch (e) { document.getElementById('syncStatus').innerHTML = '❌ Error Koneksi'; }
        }

        // --- RENDER KALENDER (LEBIH SIMPLE & PROFESIONAL) ---
        function renderCalendar() {
            const m = parseInt(document.getElementById('monthSelect').value);
            const y = parseInt(document.getElementById('yearSelect').value);
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            const first = new Date(y, m, 1).getDay();
            const days = new Date(y, m+1, 0).getDate();
            
            for(let i=0; i<first; i++) cal.innerHTML += `<div class="bg-slate-50/50 rounded-xl border border-transparent"></div>`;
            for(let i=1; i<=days; i++) {
                let dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                let hasData = Peminjamans.filter(b => b.date === dStr);
                
                // Menampilkan Ikon Kecil di dalam sel kalender
                let indicatorHtml = hasData.map(t => {
                    let isMasuk = t.type === 'Barang Masuk';
                    return `
                        <div class="text-[10px] truncate bg-slate-50 rounded px-1 py-0.5 border border-slate-100 flex items-center gap-1 font-medium text-slate-600" title="${t.name}">
                            <i class="fas ${isMasuk ? 'fa-arrow-down text-green-500' : 'fa-arrow-up text-orange-500'}"></i> ${t.name.split(' ')[0]}
                        </div>
                    `;
                }).join('');

                cal.innerHTML += `
                    <div onclick="viewDaySchedule('${dStr}')" class="calendar-day bg-white border border-slate-200 p-2 cursor-pointer flex flex-col">
                        <span class="font-black text-sm text-slate-800 mb-1">${i}</span>
                        <div class="flex-1 space-y-1 overflow-hidden">
                            ${indicatorHtml}
                        </div>
                    </div>`;
            }
        }

        window.viewDaySchedule = function(dateStr) {
            const elDate = document.getElementById('bDate');
            if(elDate) elDate.value = dateStr;
            cancelEdit(); // Reset form jika sebelumnya mode edit
            
            document.getElementById('viewDayTitle').innerText = new Date(dateStr).toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'});
            
            const filtered = Peminjamans.filter(b => b.date === dateStr);
            let html = filtered.length ? '' : '<div class="text-center py-20 text-slate-400 italic font-medium"><i class="fas fa-box-open text-3xl mb-3 block opacity-50"></i>Belum ada aktivitas</div>';
            
            filtered.forEach(b => {
                let isMasuk = b.type === 'Barang Masuk';
                html += `
                    <div class="bg-white p-5 rounded-2xl border-l-[6px] shadow-sm mb-4 border border-slate-200 relative ${isMasuk ? 'border-l-green-500' : 'border-l-orange-500'}">
                        
                        ${isAdmin ? `
                        <div class="absolute top-4 right-4 flex gap-2">
                            <button onclick="editMode('${b.id}')" class="bg-blue-50 text-blue-600 p-2 rounded-lg hover:bg-blue-100 transition" title="Edit"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteRecord('${b.id}')" class="bg-red-50 text-red-600 p-2 rounded-lg hover:bg-red-100 transition" title="Hapus"><i class="fas fa-trash"></i></button>
                        </div>
                        ` : ''}

                        <div class="flex items-center gap-2 mb-1">
                            <span class="bg-slate-100 px-2.5 py-0.5 rounded-md text-[10px] font-bold text-slate-600 tracking-wide uppercase"><i class="fas ${isMasuk ? 'fa-arrow-down text-green-500' : 'fa-arrow-up text-orange-500'}"></i> ${b.type}</span>
                            <span class="text-[11px] font-bold text-slate-400 bg-slate-50 px-2 py-0.5 rounded-md"><i class="far fa-clock"></i> ${b.start} - ${b.end}</span>
                        </div>
                        <h4 class="font-black text-slate-800 text-lg pr-20">${b.name}</h4>
                        <p class="text-xs text-slate-500 font-medium mb-3">Penanggung Jawab (GA): ${b.staffGA}</p>
                        
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 mb-3 text-sm text-slate-700">
                            ${b.desc}
                        </div>

                        ${b.fotoAwal ? `
                        <p class="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-wider">Dokumentasi Kamera:</p>
                        <div class="grid grid-cols-3 gap-2">
                            <a href="${getDirectLink(b.fotoAwal)}" target="_blank"><img src="${getDirectLink(b.fotoAwal)}" class="h-24 w-full object-cover rounded-xl border border-slate-200 hover:opacity-80 transition"></a>
                            <a href="${getDirectLink(b.fotoBarang)}" target="_blank"><img src="${getDirectLink(b.fotoBarang)}" class="h-24 w-full object-cover rounded-xl border border-slate-200 hover:opacity-80 transition"></a>
                            <a href="${getDirectLink(b.fotoAkhir)}" target="_blank"><img src="${getDirectLink(b.fotoAkhir)}" class="h-24 w-full object-cover rounded-xl border border-slate-200 hover:opacity-80 transition"></a>
                        </div>` : '<p class="text-[11px] bg-red-50 text-red-500 p-2 rounded-lg border border-red-100 inline-block font-medium mt-1"><i class="fas fa-exclamation-circle"></i> Bukti foto belum diunggah</p>'}
                    </div>`;
            });
            document.getElementById('viewDayContent').innerHTML = html;
            const modal = document.getElementById('viewDayModal');
            if(modal) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
        };

        window.closeModal = function(id) {
            const el = document.getElementById(id);
            if(el) { el.classList.add('hidden'); el.classList.remove('flex'); }
        };

        // --- SISTEM EDIT/DELETE ADMIN ---
        window.editMode = function(id) {
            const data = Peminjamans.find(x => x.id === id);
            if(!data) return;
            document.getElementById('bId').value = data.id;
            // Memecah nama dan divisi yang sebelumnya digabung ("Nama (Divisi)")
            let nameOnly = data.name.split(' (')[0];
            let divOnly = data.name.split(' (')[1]?.replace(')','');
            
            document.getElementById('bDivisi').value = divOnly || '';
            filterNamesByDivision();
            document.getElementById('bName').value = nameOnly;
            
            document.getElementById('bPhone').value = data.phone || '';
            document.getElementById('bEmail').value = data.email || '';
            document.getElementById('bStaffGA').value = data.staffGA || '';
            document.getElementById('bType').value = data.type || 'Barang Masuk';
            document.getElementById('bDesc').value = data.desc || '';
            document.getElementById('bStart').value = data.start || '';
            document.getElementById('bEnd').value = data.end || '';

            document.getElementById('btnSubmit').innerHTML = '<i class="fas fa-save"></i> UPDATE DATA';
            document.getElementById('btnSubmit').classList.replace('bg-slate-800', 'bg-blue-600');
            document.getElementById('btnCancelEdit').classList.remove('hidden');
        };

        window.cancelEdit = function() {
            document.getElementById('PeminjamanForm').reset();
            document.getElementById('bId').value = '';
            document.getElementById('btnSubmit').innerHTML = 'SIMPAN & KIRIM';
            document.getElementById('btnSubmit').classList.replace('bg-blue-600', 'bg-slate-800');
            document.getElementById('btnCancelEdit').classList.add('hidden');
        }

        window.deleteRecord = async function(id) {
            if(!confirm("Yakin ingin menghapus data ini secara permanen?")) return;
            
            // Mengirim request hapus ke Google Apps Script
            try {
                // Untuk script sesungguhnya: action "delete"
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", id: id }) });
                alert("Permintaan hapus terkirim!");
                location.reload();
            } catch (e) {
                alert("Error koneksi penghapusan.");
            }
        }

        async function savePeminjaman(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const isEdit = document.getElementById('bId').value !== "";
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROSES...'; 
            btn.disabled = true;

            const id = isEdit ? document.getElementById('bId').value : "TRX-" + Date.now();
            const link = window.location.href.split('?')[0] + "?capture=" + id;
            
            const b = {
                id: id, 
                name: `${document.getElementById('bName').value} (${document.getElementById('bDivisi').value})`,
                type: document.getElementById('bType').value, 
                date: document.getElementById('bDate').value,
                start: document.getElementById('bStart').value, 
                end: document.getElementById('bEnd').value,
                phone: document.getElementById('bPhone').value, 
                email: document.getElementById('bEmail').value,
                desc: document.getElementById('bDesc').value, 
                staffGA: document.getElementById('bStaffGA').value, 
                linkKamera: link
            };

            try {
                // Menambahkan flag sendEmailNotif agar Google Apps Script Anda (jika sudah diatur) memicu fungsi kirim email ke Admin
                const payload = { 
                    action: isEdit ? "edit" : "save", 
                    booking: b,
                    sendEmailNotif: true 
                };
                
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert(isEdit ? "Data berhasil diupdate!" : "Data Tersimpan! Link Kamera dikirim ke email peminjam & Notifikasi dikirim ke Admin.");
                location.reload();
            } catch (err) { 
                alert("Error Menyimpan"); 
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        // --- SISTEM KAMERA ---
        function showCaptureMode(id) {
            document.getElementById('calendarApp').classList.add('hidden');
            document.getElementById('captureApp').classList.remove('hidden');
            document.getElementById('captureTitle').innerText = "ID TRX: " + id;
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('locationInfo').innerText = `📍 GPS: ${currentLocation.lat.toFixed(5)}, ${currentLocation.lng.toFixed(5)}`;
                });
            }
        }

        async function processImage(input, prevId) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('hiddenCanvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 800; canvas.height = 600;
                    ctx.drawImage(img, 0, 0, 800, 600);
                    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 540, 800, 60);
                    ctx.fillStyle = "white"; ctx.font = "bold 14px Arial";
                    ctx.fillText(`ID: ${new URLSearchParams(window.location.search).get('capture')} | GPS: ${currentLocation.lat}, ${currentLocation.lng}`, 20, 575);
                    document.getElementById(prevId).src = canvas.toDataURL('image/jpeg', 0.7);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function submitEvidence() {
            const id = new URLSearchParams(window.location.search).get('capture');
            const btn = document.getElementById('btnUpload');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MENGIRIM...'; btn.disabled = true;
            const payload = {
                action: "uploadEvidence", id: id,
                fotoAwal: document.getElementById('prevAwal').src,
                fotoBarang: document.getElementById('prevBarang').src,
                fotoAkhir: document.getElementById('prevAkhir').src,
                lat: currentLocation.lat, lng: currentLocation.lng
            };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("Berhasil!"); window.location.href = window.location.href.split('?')[0];
            } catch (e) { location.reload(); }
        }

        function populateSelect(id, items) {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="">-- Pilih --</option>`;
            items.forEach(i => el.innerHTML += `<option value="${i}">${i}</option>`);
        }

        function filterNamesByDivision() {
            const div = document.getElementById('bDivisi').value;
            const el = document.getElementById('bName');
            el.innerHTML = `<option value="">-- Nama --</option>`;
            employeesData.filter(e => e.division === div).forEach(e => el.innerHTML += `<option value="${e.name}">${e.name}</option>`);
        }
    </script>
</body>
</html>
