<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Gudang GA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="sticky top-0 z-40 w-full glass-effect border-b border-slate-200 px-6 py-4 mb-6">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-slate-800">Sistem Logistik Gudang</h1>
                <p class="text-xs text-slate-500 font-medium">Monitoring Aktivitas & Bukti Dokumentasi</p>
            </div>
            <button onclick="location.reload()" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-full transition-all">
                <i class="fa-solid fa-rotate text-slate-600"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4">
        <div id="calendarContainer" class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-8">
            <h2 id="monthTitle" class="text-lg font-bold text-slate-800 mb-6">Memuat Data...</h2>
            <div id="calendarGrid" class="grid grid-cols-7 gap-2 md:gap-4"></div>
        </div>
    </main>

    <div id="myModal" class="fixed inset-0 z-50 hidden bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-slate-50 w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-6 border-b border-slate-200 bg-white flex justify-between items-center">
                <h3 id="modalTitle" class="text-xl font-bold text-slate-800">Detail Aktivitas</h3>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center bg-slate-100 hover:bg-red-50 hover:text-red-500 rounded-full transition-all">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div id="modalContent" class="p-6 max-h-[70vh] overflow-y-auto custom-scrollbar">
                </div>
        </div>
    </div>

    <script>
        // GANTI DENGAN URL WEB APP SCRIPT ANDA
        const WEB_APP_URL = "URL_APPS_SCRIPT_ANDA_DI_SINI"; 
        
        let allBookings = [];

        // Inisialisasi Data
        async function init() {
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                if (data.status === "success") {
                    allBookings = data.bookings;
                    renderCalendar();
                }
            } catch (err) {
                console.error("Gagal memuat data:", err);
                document.getElementById('monthTitle').innerText = "Gagal memuat data. Periksa koneksi.";
            }
        }

        /**
         * PERBAIKAN: Fungsi Mengubah Link Drive Menjadi Gambar (Thumbnail)
         */
        function getDirectLink(url) {
            if (!url || url === "" || url === "undefined") {
                return "https://via.placeholder.com/300x200?text=Belum+Ada+Foto";
            }
            
            if (url.includes('drive.google.com')) {
                let fileId = "";
                if (url.includes('/d/')) {
                    fileId = url.split('/d/')[1].split('/')[0];
                } else if (url.includes('id=')) {
                    fileId = url.split('id=')[1].split('&')[0];
                }
                // Gunakan sz=s600 untuk kualitas gambar yang tajam namun ringan
                return fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=s600` : url;
            }
            return url;
        }

        /**
         * PERBAIKAN: Menampilkan Popup Detail dengan Foto & Waktu yang Benar
         */
        function viewDaySchedule(dateStr) {
            const filtered = allBookings.filter(b => b.date === dateStr);
            const modalContent = document.getElementById('modalContent');
            const modalTitle = document.getElementById('modalTitle');
            
            // Format judul tanggal
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            modalTitle.innerText = new Date(dateStr).toLocaleDateString('id-ID', options);

            if (filtered.length === 0) {
                modalContent.innerHTML = `<div class="text-center py-10 text-slate-400 font-medium">Tidak ada aktivitas di tanggal ini.</div>`;
            } else {
                let html = "";
                filtered.forEach(b => {
                    // Warna badge berdasarkan jenis
                    const typeColor = b.type.toLowerCase().includes('masuk') ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600';
                    const borderLeft = b.type.toLowerCase().includes('masuk') ? 'border-green-500' : 'border-orange-500';

                    html += `
                    <div class="border-l-4 ${borderLeft} bg-white p-5 rounded-2xl shadow-sm mb-5 border border-slate-100">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-1 ${typeColor} rounded-lg">
                                    ${b.type}
                                </span>
                                <h4 class="font-extrabold text-slate-800 text-base mt-2">${b.name}</h4>
                            </div>
                            <div class="text-right">
                                <span class="text-[11px] font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded-md">
                                    ${b.start} - ${b.end}
                                </span>
                            </div>
                        </div>

                        <p class="text-sm text-slate-600 leading-relaxed mb-4 bg-slate-50 p-3 rounded-xl border border-dashed border-slate-200">
                            <i class="fa-solid fa-quote-left text-slate-300 mr-1"></i> ${b.desc || 'Tidak ada deskripsi'}
                        </p>
                        
                        <div class="grid grid-cols-3 gap-3 mb-3">
                            <div class="group relative aspect-square rounded-2xl overflow-hidden bg-slate-200 border border-slate-200">
                                <img src="${getDirectLink(b.fotoAwal)}" class="w-full h-full object-cover transition-transform group-hover:scale-110" 
                                     onerror="this.src='https://via.placeholder.com/150?text=Error'" onclick="window.open('${b.fotoAwal}')">
                                <div class="absolute bottom-1 left-1 bg-black/50 text-[8px] text-white px-1.5 py-0.5 rounded">AWAL</div>
                            </div>
                            <div class="group relative aspect-square rounded-2xl overflow-hidden bg-slate-200 border border-slate-200">
                                <img src="${getDirectLink(b.fotoBarang)}" class="w-full h-full object-cover transition-transform group-hover:scale-110" 
                                     onerror="this.src='https://via.placeholder.com/150?text=Error'" onclick="window.open('${b.fotoBarang}')">
                                <div class="absolute bottom-1 left-1 bg-black/50 text-[8px] text-white px-1.5 py-0.5 rounded">BARANG</div>
                            </div>
                            <div class="group relative aspect-square rounded-2xl overflow-hidden bg-slate-200 border border-slate-200">
                                <img src="${getDirectLink(b.fotoAkhir)}" class="w-full h-full object-cover transition-transform group-hover:scale-110" 
                                     onerror="this.src='https://via.placeholder.com/150?text=Error'" onclick="window.open('${b.fotoAkhir}')">
                                <div class="absolute bottom-1 left-1 bg-black/50 text-[8px] text-white px-1.5 py-0.5 rounded">AKHIR</div>
                            </div>
                        </div>

                        <div class="flex items-center justify-between mt-4 pt-4 border-t border-slate-100">
                            <div class="flex items-center gap-2">
                                <div class="w-7 h-7 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-[10px]">
                                    <i class="fa-solid fa-user-shield"></i>
                                </div>
                                <span class="text-[11px] font-bold text-slate-600">${b.staffGA}</span>
                            </div>
                            <a href="https://www.google.com/maps?q=${b.lat},${b.lng}" target="_blank" 
                               class="text-[10px] font-bold text-blue-600 hover:underline">
                               <i class="fa-solid fa-location-dot mr-1"></i> Lihat Lokasi
                            </a>
                        </div>
                    </div>`;
                });
                modalContent.innerHTML = html;
            }
            document.getElementById('myModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('myModal').classList.add('hidden');
        }

        function renderCalendar() {
            // Logika render kalender Anda sebelumnya tetap di sini
            // Pastikan setiap kotak tanggal memanggil: onclick="viewDaySchedule('YYYY-MM-DD')"
            const grid = document.getElementById('calendarGrid');
            document.getElementById('monthTitle').innerText = "April 2026"; // Contoh statis
            
            grid.innerHTML = "";
            for(let i=1; i<=30; i++) {
                const dateVal = `2026-04-${i.toString().padStart(2, '0')}`;
                const hasData = allBookings.some(b => b.date === dateVal);
                
                grid.innerHTML += `
                    <div onclick="viewDaySchedule('${dateVal}')" 
                         class="aspect-square flex flex-col items-center justify-center rounded-2xl cursor-pointer transition-all border
                         ${hasData ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-100 hover:bg-slate-50'}">
                        <span class="text-sm font-bold ${hasData ? 'text-indigo-600' : 'text-slate-700'}">${i}</span>
                        ${hasData ? '<div class="w-1.5 h-1.5 bg-indigo-500 rounded-full mt-1"></div>' : ''}
                    </div>
                `;
            }
        }

        // Jalankan saat startup
        window.onload = init;
    </script>
</body>
</html>
