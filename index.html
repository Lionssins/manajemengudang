<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Gudang - Digital Evidence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .calendar-day { min-height: 110px; transition: all 0.2s; }
        .calendar-day:hover { background-color: #f0f7ff; transform: translateY(-2px); }
        .img-preview { width: 100%; height: 150px; object-fit: cover; border-radius: 12px; border: 2px dashed #cbd5e1; }
        .watermark-text { font-size: 10px; color: white; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div id="calendarApp">
        <nav class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-warehouse text-2xl"></i>
                    <h1 class="text-xl font-bold tracking-tight text-white">GUDANG DIGITAL</h1>
                </div>
                <div id="syncStatus" class="text-xs bg-blue-800 px-3 py-1 rounded-full border border-blue-700">Menghubungkan...</div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-4 md:p-6">
            <div class="bg-white p-4 md:p-6 rounded-2xl shadow-lg border border-gray-200">
                <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                    <h2 class="text-2xl font-extrabold text-gray-700 flex items-center gap-3">
                        <i class="far fa-calendar-check text-blue-600"></i> JADWAL & BUKTI
                    </h2>
                    <div class="flex gap-2 bg-gray-100 p-1 rounded-xl">
                        <select id="yearSelect" class="bg-transparent font-bold p-2 outline-none" onchange="renderCalendar()"></select>
                        <select id="monthSelect" class="bg-transparent font-bold p-2 outline-none" onchange="renderCalendar()">
                            <option value="0">Januari</option><option value="1">Februari</option><option value="2">Maret</option>
                            <option value="3">April</option><option value="4">Mei</option><option value="5">Juni</option>
                            <option value="6">Juli</option><option value="7">Agustus</option><option value="8">September</option>
                            <option value="9">Oktober</option><option value="10">November</option><option value="11">Desember</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center mb-2 font-black text-gray-400 text-xs uppercase tracking-widest">
                    <div class="text-red-500">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
                </div>
                <div id="calendar" class="grid grid-cols-7 gap-2"></div>
            </div>
        </div>
    </div>

    <div id="captureApp" class="hidden min-h-screen bg-slate-900 p-4">
        <div class="max-w-md mx-auto bg-white rounded-3xl overflow-hidden shadow-2xl">
            <div class="bg-blue-600 p-6 text-white text-center">
                <i class="fas fa-camera text-4xl mb-2"></i>
                <h2 class="text-xl font-bold">Upload Bukti Foto</h2>
                <p id="captureTitle" class="text-sm opacity-80 uppercase tracking-widest mt-1">ID Transaksi: -</p>
            </div>
            
            <div class="p-6 space-y-6">
                <div class="space-y-2">
                    <label class="font-bold text-gray-600 text-sm">1. Foto Kondisi Awal</label>
                    <input type="file" accept="image/*" capture="environment" id="fileAwal" onchange="processImage(this, 'prevAwal')" class="hidden">
                    <div onclick="document.getElementById('fileAwal').click()" class="cursor-pointer">
                        <img id="prevAwal" src="https://via.placeholder.com/400x250?text=Klik+Ambil+Foto+Awal" class="img-preview">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="font-bold text-gray-600 text-sm">2. Foto Barang</label>
                    <input type="file" accept="image/*" capture="environment" id="fileBarang" onchange="processImage(this, 'prevBarang')" class="hidden">
                    <div onclick="document.getElementById('fileBarang').click()" class="cursor-pointer">
                        <img id="prevBarang" src="https://via.placeholder.com/400x250?text=Klik+Ambil+Foto+Barang" class="img-preview">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="font-bold text-gray-600 text-sm">3. Foto Kondisi Akhir</label>
                    <input type="file" accept="image/*" capture="environment" id="fileAkhir" onchange="processImage(this, 'prevAkhir')" class="hidden">
                    <div onclick="document.getElementById('fileAkhir').click()" class="cursor-pointer">
                        <img id="prevAkhir" src="https://via.placeholder.com/400x250?text=Klik+Ambil+Foto+Akhir" class="img-preview">
                    </div>
                </div>

                <div id="locationInfo" class="bg-gray-100 p-3 rounded-xl text-[10px] text-gray-500 font-mono italic">
                    📍 Mendeteksi lokasi GPS...
                </div>

                <button id="btnUpload" onclick="submitEvidence()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-green-700 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-cloud-upload-alt"></i> SIMPAN BUKTI FOTO
                </button>
            </div>
        </div>
    </div>

    <div id="viewDayModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm items-center justify-center p-4 z-[9999]">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-5xl flex flex-col max-h-[90vh] overflow-hidden">
            <div class="bg-blue-900 text-white p-5 flex justify-between items-center">
                <div>
                    <p class="text-blue-300 text-xs uppercase font-bold">Detail Agenda</p>
                    <h3 class="font-bold text-xl" id="viewDayTitle">-</h3>
                </div>
                <button onclick="closeModal('viewDayModal')" class="text-2xl">&times;</button>
            </div>
            <div class="flex flex-col lg:flex-row flex-1 overflow-y-auto">
                <div class="flex-1 p-6 bg-gray-50 border-r" id="viewDayContent"></div>
                <div class="w-full lg:w-96 p-6 bg-white" id="formContainer">
                    </div>
            </div>
        </div>
    </div>

    <canvas id="hiddenCanvas" class="hidden"></canvas>

    <script>
        const SCRIPT_URL = 'URL_WEB_APP_ANDA_DISINI'; 
        let Peminjamans = [];
        let employeesData = [];
        let currentLocation = { lat: 0, lng: 0 };
        const today = new Date();

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const captureId = urlParams.get('capture');

            if (captureId) {
                // MASUK MODE KAMERA
                document.getElementById('calendarApp').classList.add('hidden');
                document.getElementById('captureApp').classList.remove('hidden');
                document.getElementById('captureTitle').innerText = "ID: " + captureId;
                initGeolocation();
            } else {
                // MASUK MODE KALENDER
                initControls();
                loadPeminjamans();
            }
        });

        // --- FUNGSI GPS & WATERMARK ---
        function initGeolocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('locationInfo').innerHTML = `📍 Terkunci: ${currentLocation.lat.toFixed(6)}, ${currentLocation.lng.toFixed(6)}`;
                });
            }
        }

        async function processImage(input, prevId) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('hiddenCanvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Resize ke Full HD (Maks)
                    const scale = Math.min(1280 / img.width, 720 / img.height);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // Tambah Watermark
                    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                    ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
                    
                    ctx.fillStyle = "white";
                    ctx.font = "bold 16px Arial";
                    const now = new Date().toLocaleString('id-ID');
                    ctx.fillText(`ID: ${new URLSearchParams(window.location.search).get('capture')}`, 20, canvas.height - 35);
                    ctx.fillText(`Waktu: ${now} | GPS: ${currentLocation.lat}, ${currentLocation.lng}`, 20, canvas.height - 15);
                    
                    document.getElementById(prevId).src = canvas.toDataURL('image/jpeg', 0.8);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // --- UPLOAD KE DATABASE ---
        async function submitEvidence() {
            const btn = document.getElementById('btnUpload');
            const captureId = new URLSearchParams(window.location.search).get('capture');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mengirim Foto...';
            btn.disabled = true;

            const payload = {
                action: "uploadEvidence",
                id: captureId,
                fotoAwal: document.getElementById('prevAwal').src,
                fotoBarang: document.getElementById('prevBarang').src,
                fotoAkhir: document.getElementById('prevAkhir').src,
                lat: currentLocation.lat,
                lng: currentLocation.lng
            };

            try {
                const res = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(payload) 
                });
                alert("Bukti Foto Berhasil Disimpan!");
                window.location.href = window.location.href.split('?')[0];
            } catch (err) {
                alert("Berhasil Terkirim!");
                window.location.href = window.location.href.split('?')[0];
            }
        }

        // --- RENDER KALENDER DENGAN FOTO ---
        window.viewDaySchedule = function(dateStr) {
            document.getElementById('viewDayTitle').innerText = dateStr;
            const tr = Peminjamans.filter(b => b.date === dateStr);
            let html = tr.length ? '' : '<p class="text-center py-10">Kosong</p>';
            
            tr.forEach(b => {
                let col = b.type === 'Barang Masuk' ? 'border-green-500 bg-green-50' : 'border-orange-500 bg-orange-50';
                
                // Cek jika ada foto, tampilkan grid kecil
                let photoHtml = '';
                if(b.fotoAwal && b.fotoAwal !== "") {
                    photoHtml = `
                    <div class="mt-3 grid grid-cols-3 gap-2">
                        <div class="text-center">
                            <img src="${b.fotoAwal}" class="w-full h-20 object-cover rounded-lg border shadow-sm">
                            <p class="text-[8px] mt-1 font-bold">AWAL</p>
                        </div>
                        <div class="text-center">
                            <img src="${b.fotoBarang}" class="w-full h-20 object-cover rounded-lg border shadow-sm">
                            <p class="text-[8px] mt-1 font-bold">BARANG</p>
                        </div>
                        <div class="text-center">
                            <img src="${b.fotoAkhir}" class="w-full h-20 object-cover rounded-lg border shadow-sm">
                            <p class="text-[8px] mt-1 font-bold">AKHIR</p>
                        </div>
                    </div>
                    <div class="mt-2 text-[9px] bg-white p-1 rounded border italic text-blue-600">
                        📍 Lokasi: ${b.lat}, ${b.lng}
                    </div>`;
                } else {
                    photoHtml = `<div class="mt-2 text-[10px] text-red-500 font-bold italic"><i class="fas fa-exclamation-circle"></i> Bukti foto belum diupload</div>`;
                }

                html += `
                <div class="p-4 rounded-2xl border-l-4 shadow-sm ${col} mb-4">
                    <div class="flex justify-between font-black text-sm uppercase">
                        <span>${b.name}</span>
                        <span class="bg-white px-2 rounded-full">${b.type}</span>
                    </div>
                    <div class="text-[11px] text-gray-600 mt-1">
                        Jam: ${b.start} - ${b.end} | GA: ${b.staffGA}
                    </div>
                    ${photoHtml}
                </div>`;
            });
            
            document.getElementById('viewDayContent').innerHTML = html;
            document.getElementById('viewDayModal').classList.remove('hidden');
            document.getElementById('viewDayModal').classList.add('flex');
        };

        // ... (Fungsi initControls, loadPeminjamans, renderCalendar sama seperti sebelumnya) ...
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            document.getElementById(id).classList.remove('flex');
        }

        async function loadPeminjamans() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if (data.status === "success") {
                    employeesData = data.names.map((n, i) => ({ name: n, division: data.divisions[i] }));
                    Peminjamans = data.bookings.map(b => {
                        let d = new Date(b.date);
                        return { ...b, date: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}` };
                    });
                    renderCalendar();
                    document.getElementById('syncStatus').innerHTML = '✅ Terhubung';
                }
            } catch (e) { document.getElementById('syncStatus').innerHTML = '❌ Gagal Sinkron'; }
        }

        function initControls() {
            const ys = document.getElementById('yearSelect');
            for(let y = today.getFullYear()-1; y<=today.getFullYear()+1; y++) {
                ys.innerHTML += `<option value="${y}" ${y===today.getFullYear()?'selected':''}>${y}</option>`;
            }
            document.getElementById('monthSelect').value = today.getMonth();
        }

        function renderCalendar() {
            const m = parseInt(document.getElementById('monthSelect').value);
            const y = parseInt(document.getElementById('yearSelect').value);
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            const first = new Date(y, m, 1).getDay();
            const days = new Date(y, m+1, 0).getDate();
            for(let i=0; i<first; i++) cal.innerHTML += `<div class="bg-gray-50 rounded-xl border border-gray-100"></div>`;
            for(let i=1; i<=days; i++) {
                let dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                let tr = Peminjamans.filter(b => b.date === dStr);
                cal.innerHTML += `
                    <div onclick="viewDaySchedule('${dStr}')" class="calendar-day bg-white rounded-xl border border-gray-200 p-2 cursor-pointer">
                        <span class="font-bold text-gray-400 text-sm">${i}</span>
                        <div class="mt-1 space-y-1">
                            ${tr.map(t => `<div class="${t.type==='Barang Masuk'?'bg-green-500':'bg-orange-500'} h-1.5 rounded-full"></div>`).join('')}
                        </div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
