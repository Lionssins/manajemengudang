<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Gudang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <nav class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-warehouse text-2xl"></i>
                <h1 class="text-xl font-bold">MANAJEMEN GUDANG</h1>
            </div>
            <div id="statusIndicator" class="text-xs bg-blue-700 px-3 py-1 rounded-full">Menghubungkan...</div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto p-4">
        <div class="bg-white p-6 rounded-xl shadow-md">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 border-b pb-4">
                <h2 class="text-2xl font-bold text-gray-700"><i class="far fa-calendar-alt text-blue-600"></i> JADWAL TRANSAKSI</h2>
                <div class="flex gap-2">
                    <select id="yearSelect" class="border p-2 rounded-lg" onchange="renderCalendar()"></select>
                    <select id="monthSelect" class="border p-2 rounded-lg" onchange="renderCalendar()">
                        <option value="0">Januari</option><option value="1">Februari</option><option value="2">Maret</option>
                        <option value="3">April</option><option value="4">Mei</option><option value="5">Juni</option>
                        <option value="6">Juli</option><option value="7">Agustus</option><option value="8">September</option>
                        <option value="9">Oktober</option><option value="10">November</option><option value="11">Desember</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-1 text-center font-bold mb-2 text-sm text-gray-500">
                <div class="text-red-500">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
            </div>
            <div id="calendar" class="grid grid-cols-7 gap-1 bg-gray-200 border rounded-lg p-1 min-h-[400px]"></div>
        </div>
    </div>

    <div id="viewDayModal" style="display: none;" class="fixed inset-0 bg-black/60 z-[9999] flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden">
            <div class="bg-blue-800 text-white p-4 flex justify-between items-center">
                <h3 id="viewDayTitle" class="font-bold">Detail Transaksi</h3>
                <button onclick="closeModal()" class="text-2xl">&times;</button>
            </div>
            <form onsubmit="saveData(event)" class="p-5 space-y-4">
                <input type="hidden" id="bDate">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold mb-1">Divisi</label>
                        <select id="bDivisi" class="w-full border p-2 rounded" required></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1">Nama PJ</label>
                        <input type="text" id="bName" class="w-full border p-2 rounded" required>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold mb-1">Jam Mulai</label>
                        <input type="time" id="bStart" class="w-full border p-2 rounded" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold mb-1">Jam Selesai</label>
                        <input type="time" id="bEnd" class="w-full border p-2 rounded" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold mb-1">Jenis</label>
                    <select id="bType" class="w-full border p-2 rounded">
                        <option>Barang Masuk</option>
                        <option>Barang Keluar</option>
                    </select>
                </div>
                <button type="submit" id="btnSubmit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">SIMPAN TRANSAKSI</button>
            </form>
        </div>
    </div>

    <script>
        // GANTI URL DI BAWAH INI DENGAN URL WEB APP KAMU
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYTDh88XIeBVUbghl9RujVQwymzXp9tkv10cZRLVcU9xmYmcr2jQdXl2IVOHdw0_Mq/exec'; 

        let allData = [];
        const today = new Date();
        
        document.addEventListener('DOMContentLoaded', () => {
            initControls();
            loadData();
        });

        function initControls() {
            const ySelect = document.getElementById('yearSelect');
            const currentYear = today.getFullYear();
            for(let y = currentYear - 1; y <= currentYear + 1; y++) {
                ySelect.innerHTML += `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`;
            }
            document.getElementById('monthSelect').value = today.getMonth();
        }

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();
                if(result.status === "success") {
                    allData = result.bookings;
                    fillSelect('bDivisi', result.divisions);
                    document.getElementById('statusIndicator').innerText = "Terhubung";
                    document.getElementById('statusIndicator').classList.replace('bg-blue-700', 'bg-green-600');
                    renderCalendar();
                }
            } catch (e) {
                alert("Gagal memuat data. Pastikan URL Script benar & akses diset 'Anyone'.");
                document.getElementById('statusIndicator').innerText = "Error Koneksi";
            }
        }

        function fillSelect(id, items) {
            const el = document.getElementById(id);
            el.innerHTML = items.map(i => `<option value="${i}">${i}</option>`).join('');
        }

        function renderCalendar() {
            const month = parseInt(document.getElementById('monthSelect').value);
            const year = parseInt(document.getElementById('yearSelect').value);
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for(let i = 0; i < firstDay; i++) cal.innerHTML += `<div class="bg-gray-50/50"></div>`;

            for(let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const daily = allData.filter(d => d.Tanggal.includes(dateStr) || d.date === dateStr);
                
                let html = `
                    <div onclick="openModal('${dateStr}')" class="bg-white border p-1 min-h-[80px] cursor-pointer hover:bg-blue-50 transition">
                        <div class="text-xs font-bold text-gray-400">${i}</div>
                        <div class="space-y-1 mt-1">
                            ${daily.map(d => `
                                <div class="text-[9px] p-1 rounded ${d.Jenis === 'Barang Masuk' ? 'bg-green-500' : 'bg-orange-500'} text-white truncate">
                                    ${d.Nama}
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                cal.innerHTML += html;
            }
        }

        function openModal(date) {
            document.getElementById('bDate').value = date;
            document.getElementById('viewDayTitle').innerText = "Transaksi Tanggal: " + date;
            document.getElementById('viewDayModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('viewDayModal').style.display = 'none';
        }

        async function saveData(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "Menyimpan...";

            const payload = {
                action: "save",
                booking: {
                    id: Date.now(),
                    name: document.getElementById('bName').value,
                    type: document.getElementById('bType').value,
                    date: document.getElementById('bDate').value,
                    start: document.getElementById('bStart').value,
                    end: document.getElementById('bEnd').value,
                    phone: "08123", // dummy
                    email: "test@mail.com", // dummy
                    desc: "Input manual",
                    staffGA: "Admin",
                    linkKamera: ""
                }
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                alert("Berhasil disimpan!");
                location.reload();
            } catch (err) {
                alert("Gagal simpan data.");
                btn.disabled = false;
                btn.innerText = "SIMPAN TRANSAKSI";
            }
        }
    </script>
</body>
</html>
