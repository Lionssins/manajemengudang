<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Gudang - Fixed Foto & Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .calendar-day { min-height: 110px; transition: all 0.2s; border-radius: 1rem; }
        .calendar-day:hover { background-color: #f8fafc; transform: translateY(-2px); }
        .img-preview-box { width: 100%; height: 120px; object-fit: cover; border-radius: 0.75rem; border: 2px dashed #e2e8f0; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="calendarApp">
        <nav class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-warehouse text-2xl text-blue-400"></i>
                    <h1 class="text-xl font-bold tracking-tight">GUDANG DIGITAL</h1>
                </div>
                <div id="syncStatus" class="text-xs bg-blue-800 px-3 py-1 rounded-full border border-blue-700">Menghubungkan...</div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-4 md:p-6">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <h2 class="text-2xl font-black text-slate-800 flex items-center gap-3">
                        <i class="far fa-calendar-alt text-blue-600"></i> MONITORING JADWAL
                    </h2>
                    <div class="flex gap-2 bg-slate-100 p-1.5 rounded-2xl">
                        <select id="yearSelect" class="bg-transparent font-bold px-3 py-1 outline-none" onchange="renderCalendar()"></select>
                        <select id="monthSelect" class="bg-transparent font-bold px-3 py-1 outline-none" onchange="renderCalendar()">
                            <option value="0">Januari</option><option value="1">Februari</option><option value="2">Maret</option>
                            <option value="3">April</option><option value="4">Mei</option><option value="5">Juni</option>
                            <option value="6">Juli</option><option value="7">Agustus</option><option value="8">September</option>
                            <option value="9">Oktober</option><option value="10">November</option><option value="11">Desember</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center mb-4 font-bold text-slate-400 text-[10px] uppercase">
                    <div class="text-red-500">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
                </div>
                <div id="calendar" class="grid grid-cols-7 gap-3"></div>
            </div>
        </div>
    </div>

    <div id="captureApp" class="hidden min-h-screen bg-slate-900 p-4">
        <div class="max-w-md mx-auto bg-white rounded-[2rem] overflow-hidden shadow-2xl">
            <div class="bg-blue-600 p-8 text-white text-center">
                <i class="fas fa-camera text-5xl mb-3"></i>
                <h2 class="text-2xl font-black">Upload Bukti</h2>
                <p id="captureTitle" class="text-xs opacity-70 font-mono tracking-widest">-</p>
            </div>
            <div class="p-6 space-y-5">
                <input type="file" accept="image/*" capture="environment" id="fileAwal" onchange="processImage(this, 'prevAwal')" class="hidden">
                <img id="prevAwal" onclick="document.getElementById('fileAwal').click()" src="https://via.placeholder.com/400x200?text=Klik+Foto+Kondisi+Awal" class="img-preview-box">
                
                <input type="file" accept="image/*" capture="environment" id="fileBarang" onchange="processImage(this, 'prevBarang')" class="hidden">
                <img id="prevBarang" onclick="document.getElementById('fileBarang').click()" src="https://via.placeholder.com/400x200?text=Klik+Foto+Barang" class="img-preview-box">
                
                <input type="file" accept="image/*" capture="environment" id="fileAkhir" onchange="processImage(this, 'prevAkhir')" class="hidden">
                <img id="prevAkhir" onclick="document.getElementById('fileAkhir').click()" src="https://via.placeholder.com/400x200?text=Klik+Foto+Kondisi+Akhir" class="img-preview-box">

                <div id="locationInfo" class="text-[10px] text-slate-400 font-mono italic text-center">📍 Mendeteksi GPS...</div>
                <button id="btnUpload" onclick="submitEvidence()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg">SIMPAN BUKTI FOTO</button>
            </div>
        </div>
    </div>

    <div id="viewDayModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md items-center justify-center p-4 z-[9999]">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-6xl flex flex-col max-h-[90vh] overflow-hidden">
            <div class="bg-blue-900 text-white p-6 flex justify-between items-center">
                <div><h3 class="font-black text-2xl" id="viewDayTitle">Detail Agenda</h3></div>
                <button onclick="closeModal('viewDayModal')" class="bg-white/10 w-12 h-12 rounded-full text-3xl">&times;</button>
            </div>
            <div class="flex flex-col lg:flex-row flex-1 overflow-hidden">
                <div class="flex-1 p-6 bg-slate-50 overflow-y-auto border-r border-slate-100" id="viewDayContent"></div>
                
                <div class="w-full lg:w-[400px] p-8 bg-white overflow-y-auto">
                    <h4 class="font-bold text-slate-700 mb-6 flex items-center gap-2"><i class="fas fa-plus-circle text-green-500"></i> Transaksi Baru</h4>
                    <form id="PeminjamanForm" onsubmit="savePeminjaman(event)" class="space-y-4">
                        <input type="hidden" id="bDate">
                        <select id="bDivisi" required onchange="filterNamesByDivision()" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm outline-none focus:border-blue-500"></select>
                        <select id="bName" required class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm outline-none focus:border-blue-500"></select>
                        <input type="tel" id="bPhone" required placeholder="No. WhatsApp" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm outline-none">
                        <input type="email" id="bEmail" required placeholder="Email untuk Link" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm outline-none">
                        <select id="bStaffGA" required class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm outline-none"></select>
                        <select id="bType" class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm font-bold bg-slate-50">
                            <option value="Barang Masuk">📥 MASUK</option>
                            <option value="Barang Keluar">📤 KELUAR</option>
                        </select>
                        <textarea id="bDesc" required placeholder="Keterangan Barang..." class="w-full border-2 border-slate-100 rounded-xl p-3 text-sm outline-none"></textarea>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="time" id="bStart" required class="border-2 border-slate-100 rounded-xl p-3 text-sm">
                            <input type="time" id="bEnd" required class="border-2 border-slate-100 rounded-xl p-3 text-sm">
                        </div>
                        <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg">SIMPAN & KIRIM LINK</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <canvas id="hiddenCanvas" class="hidden"></canvas>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby1-7CWPbGoVNeGDCTACPbXnISz63uxsq_LgQNCQU56GInTujDQOc_IMg7KuX-PGLxKzw/exec'; 
        let Peminjamans = [];
        let employeesData = [];
        let currentLocation = { lat: 0, lng: 0 };

        // --- FUNGSI FIX FOTO (DRIVE TO DIRECT LINK) ---
        function getDirectLink(url) {
            if (!url || url === "") return "https://via.placeholder.com/150?text=No+Photo";
            if (url.includes('drive.google.com')) {
                const fileId = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1]?.split('&')[0];
                return fileId ? `https://lh3.googleusercontent.com/u/0/d/${fileId}` : url;
            }
            return url;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('capture')) showCaptureMode(urlParams.get('capture'));
            else initCalendarMode();
        });

        function initCalendarMode() {
            const ys = document.getElementById('yearSelect');
            const now = new Date();
            for(let y = now.getFullYear()-1; y<=now.getFullYear()+2; y++) {
                ys.innerHTML += `<option value="${y}" ${y===now.getFullYear()?'selected':''}>${y}</option>`;
            }
            document.getElementById('monthSelect').value = now.getMonth();
            loadData();
        }

        async function loadData() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                if (data.status === "success") {
                    employeesData = data.names.map((n, i) => ({ name: n, division: data.divisions[i] }));
                    populateSelect('bDivisi', [...new Set(employeesData.map(e => e.division))]);
                    populateSelect('bStaffGA', data.staffGAList || []);
                    Peminjamans = data.bookings.map(b => {
                        let d = new Date(b.date);
                        return { ...b, date: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` };
                    });
                    renderCalendar();
                    document.getElementById('syncStatus').innerHTML = '✅ Terhubung';
                }
            } catch (e) { document.getElementById('syncStatus').innerHTML = '❌ Error Koneksi'; }
        }

        function renderCalendar() {
            const m = parseInt(document.getElementById('monthSelect').value);
            const y = parseInt(document.getElementById('yearSelect').value);
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            const first = new Date(y, m, 1).getDay();
            const days = new Date(y, m+1, 0).getDate();
            for(let i=0; i<first; i++) cal.innerHTML += `<div class="bg-slate-50/50 rounded-2xl"></div>`;
            for(let i=1; i<=days; i++) {
                let dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                let hasData = Peminjamans.filter(b => b.date === dStr);
                cal.innerHTML += `
                    <div onclick="viewDaySchedule('${dStr}')" class="calendar-day bg-white border-2 border-slate-100 p-2 cursor-pointer">
                        <span class="font-bold text-sm text-slate-400">${i}</span>
                        <div class="mt-1 space-y-1">
                            ${hasData.map(t => `<div class="w-full h-1.5 rounded-full ${t.type==='Barang Masuk'?'bg-green-500':'bg-orange-500'}"></div>`).join('')}
                        </div>
                    </div>`;
            }
        }

        window.viewDaySchedule = function(dateStr) {
            const elDate = document.getElementById('bDate');
            if(elDate) elDate.value = dateStr;
            document.getElementById('viewDayTitle').innerText = new Date(dateStr).toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'});
            
            const filtered = Peminjamans.filter(b => b.date === dateStr);
            let html = filtered.length ? '' : '<div class="text-center py-20 text-slate-300 italic">Kosong</div>';
            
            filtered.forEach(b => {
                html += `
                    <div class="bg-white p-4 rounded-2xl border-l-4 shadow-sm mb-3 ${b.type==='Barang Masuk'?'border-green-500':'border-orange-500'}">
                        <div class="flex justify-between font-bold text-sm"><span>${b.name}</span><span class="bg-slate-100 px-2 rounded-full text-[10px]">${b.type}</span></div>
                        <p class="text-[11px] text-slate-500">${b.start} - ${b.end} | GA: ${b.staffGA}</p>
                        <p class="text-xs mt-1 font-medium">${b.desc}</p>
                        ${b.fotoAwal ? `
                        <div class="mt-3 grid grid-cols-3 gap-2">
                            <img src="${getDirectLink(b.fotoAwal)}" class="h-20 w-full object-cover rounded-lg border">
                            <img src="${getDirectLink(b.fotoBarang)}" class="h-20 w-full object-cover rounded-lg border">
                            <img src="${getDirectLink(b.fotoAkhir)}" class="h-20 w-full object-cover rounded-lg border">
                        </div>` : '<p class="text-[10px] text-red-400 mt-2 italic">Bukti foto belum ada</p>'}
                    </div>`;
            });
            document.getElementById('viewDayContent').innerHTML = html;
            const modal = document.getElementById('viewDayModal');
            if(modal) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
        };

        window.closeModal = function(id) {
            const el = document.getElementById(id);
            if(el) { el.classList.add('hidden'); el.classList.remove('flex'); }
        };

        async function savePeminjaman(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROSES...'; btn.disabled = true;
            const id = "TRX-" + Date.now();
            const link = window.location.href.split('?')[0] + "?capture=" + id;
            const b = {
                id: id, name: `${document.getElementById('bName').value} (${document.getElementById('bDivisi').value})`,
                type: document.getElementById('bType').value, date: document.getElementById('bDate').value,
                start: document.getElementById('bStart').value, end: document.getElementById('bEnd').value,
                phone: document.getElementById('bPhone').value, email: document.getElementById('bEmail').value,
                desc: document.getElementById('bDesc').value, staffGA: document.getElementById('bStaffGA').value, linkKamera: link
            };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "save", booking: b }) });
                alert("Data Tersimpan! Link Kamera dikirim ke email.");
                location.reload();
            } catch (err) { alert("Error Simpan"); btn.disabled = false; }
        }

        // --- SISTEM KAMERA ---
        function showCaptureMode(id) {
            document.getElementById('calendarApp').classList.add('hidden');
            document.getElementById('captureApp').classList.remove('hidden');
            document.getElementById('captureTitle').innerText = "ID TRX: " + id;
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('locationInfo').innerText = `📍 GPS: ${currentLocation.lat.toFixed(5)}, ${currentLocation.lng.toFixed(5)}`;
                });
            }
        }

        async function processImage(input, prevId) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('hiddenCanvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 800; canvas.height = 600;
                    ctx.drawImage(img, 0, 0, 800, 600);
                    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0, 540, 800, 60);
                    ctx.fillStyle = "white"; ctx.font = "bold 14px Arial";
                    ctx.fillText(`ID: ${new URLSearchParams(window.location.search).get('capture')} | GPS: ${currentLocation.lat}, ${currentLocation.lng}`, 20, 575);
                    document.getElementById(prevId).src = canvas.toDataURL('image/jpeg', 0.7);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function submitEvidence() {
            const id = new URLSearchParams(window.location.search).get('capture');
            const btn = document.getElementById('btnUpload');
            btn.innerText = "MENGIRIM..."; btn.disabled = true;
            const payload = {
                action: "uploadEvidence", id: id,
                fotoAwal: document.getElementById('prevAwal').src,
                fotoBarang: document.getElementById('prevBarang').src,
                fotoAkhir: document.getElementById('prevAkhir').src,
                lat: currentLocation.lat, lng: currentLocation.lng
            };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("Berhasil!"); window.location.href = window.location.href.split('?')[0];
            } catch (e) { location.reload(); }
        }

        function populateSelect(id, items) {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="">-- Pilih --</option>`;
            items.forEach(i => el.innerHTML += `<option value="${i}">${i}</option>`);
        }

        function filterNamesByDivision() {
            const div = document.getElementById('bDivisi').value;
            const el = document.getElementById('bName');
            el.innerHTML = `<option value="">-- Nama --</option>`;
            employeesData.filter(e => e.division === div).forEach(e => el.innerHTML += `<option value="${e.name}">${e.name}</option>`);
        }
    </script>
</body>
</html>
